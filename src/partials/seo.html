<meta name="description" content="{{description}}">
  <title>{{title}}</title>
  <link rel="canonical" href="{{langBase}}{{path}}">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{langBase}}{{path}}">
  <meta property="og:image" content="{{domain}}/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="CyberHat — Security expertise, built to last.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{title}}">
  <meta name="twitter:description" content="{{description}}">
  <meta name="twitter:image" content="{{domain}}/og-image.png">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "{{siteName}}",
    "url": "{{domain}}/",
    "logo": "{{domain}}/og-image.png",
    "description": "{{description}}",
    "email": "hello@cyberh.at",
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "security",
      "email": "security@cyberh.at",
      "url": "{{domain}}/.well-known/security.txt"
    }
  }
  </script>
